name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: actions/configure-pages@v6
        id: pages
        with:
          static_site_generator: next
      - run: npm ci
      - run: npm run build
        env:
          # Custom-domain cutover build: keep paths rooted at / so the site works at https://focus-on-free.com/.
          NEXT_PUBLIC_BASE_PATH: ''
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
